name: Production health monitor
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Verify API freshness
        shell: bash
        run: |
          body=$(curl --fail --retry 3 --max-time 20 https://rail-ukraine-pulse-api.hitchhermano.workers.dev/api/health)
          node -e 'const h=JSON.parse(process.argv[1]);if(h.status!=="ok"||h.snapshot.ageMinutes>20)throw new Error(`unhealthy: ${h.status}, age=${h.snapshot.ageMinutes}`)' "$body"
