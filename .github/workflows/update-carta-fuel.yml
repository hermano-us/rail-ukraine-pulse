name: Update Carta.ua fuel enrichment

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-carta-fuel
  cancel-in-progress: false

jobs:
  import-carta:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm test
      - name: Enrich catalog with Carta.ua partner data
        run: npm run update-fuel-carta
        env:
          RAIL_API_URL: ${{ secrets.RAIL_API_URL }}
          RAIL_INGEST_TOKEN: ${{ secrets.RAIL_INGEST_TOKEN }}
