name: Refresh public UZ data

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "package.json"
      - ".github/workflows/update-data.yml"
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ukraine-public-data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.61.1
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: xvfb-run --auto-servernum npm run update-data
        env:
          BOARD_HEADLESS: "false"
      - name: Commit public snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json data/source-runtime.json
          git diff --cached --quiet || git commit -m "data: refresh public transport source fusion"
          git push
