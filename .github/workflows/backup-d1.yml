name: Backup Cloudflare D1
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: npm install --no-audit --no-fund
      - run: npx wrangler d1 export rail-ukraine-pulse --remote --output rail-ukraine-pulse.sql --config backend/wrangler.production.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_id }}
          path: rail-ukraine-pulse.sql
          retention-days: 30
