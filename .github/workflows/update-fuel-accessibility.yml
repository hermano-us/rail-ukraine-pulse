name: Update fuel accessibility

on:
  schedule:
    - cron: "40 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-fuel-accessibility
  cancel-in-progress: false

jobs:
  import-open-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm test
      - name: Import official fuel accessibility cards
        run: npm run update-fuel-accessibility
        env:
          RAIL_API_URL: ${{ secrets.RAIL_API_URL }}
          RAIL_INGEST_TOKEN: ${{ secrets.RAIL_INGEST_TOKEN }}
