name: Monitor fuel station incidents

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-fuel-incidents
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Collect incident candidates for moderation
        run: npm run update-fuel-incidents
        env:
          RAIL_API_URL: ${{ secrets.RAIL_API_URL }}
          RAIL_INGEST_TOKEN: ${{ secrets.RAIL_INGEST_TOKEN }}
