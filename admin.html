<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Rail Ukraine Pulse · Администрирование</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <main class="admin-shell">
    <header>
      <div>
        <p class="eyebrow">RAIL UKRAINE PULSE</p>
        <h1>Состояние системы</h1>
        <p class="muted">Закрытая диагностика сборщиков, источников и хранилища событий.</p>
      </div>
      <a class="map-link" href="./">Открыть карту</a>
    </header>
    <section id="login-panel" class="panel login-panel">
      <label for="admin-token">Ключ администратора</label>
      <div class="token-row">
        <input id="admin-token" type="password" autocomplete="current-password" placeholder="ADMIN_TOKEN">
        <button id="login-button" type="button">Войти</button>
      </div>
      <p id="login-error" class="error" role="alert"></p>
    </section>
    <section id="dashboard" hidden>
      <div class="toolbar">
        <p id="updated-at" class="muted"></p>
        <div>
          <button id="refresh-button" type="button">Обновить</button>
          <button id="logout-button" type="button" class="secondary">Выйти</button>
        </div>
      </div>
      <div id="metrics" class="metrics"></div>
      <section class="panel">
        <h2>Источники</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Источник</th><th>Статус</th><th>Проверен</th><th>Записей</th><th>Ошибка</th></tr></thead>
            <tbody id="source-rows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
